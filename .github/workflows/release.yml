name: release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Quality Gates (Typecheck, Lint, Test)
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Build ReproSight
        run: npm run build

      - name: Pack CLI & Core Tarballs
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          npm pack -w reprosight
          npm pack -w @reprosight/core
          mv reprosight-[0-9]*.tgz "reprosight-${TAG_NAME}.tgz"
          mv reprosight-core-*.tgz "reprosight-core-${TAG_NAME}.tgz"
          cp "reprosight-${TAG_NAME}.tgz" reprosight-latest.tgz
          sha256sum reprosight-*.tgz > SHA256SUMS.txt

      - name: Generate Release Body Notes
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          CHECKSUMS=$(cat SHA256SUMS.txt)

          # Find previous tag for changelog range
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')

          # Build changelog from conventional commits
          build_section() {
            local prefix="$1"
            local emoji="$2"
            local title="$3"
            local commits
            if [ -n "$PREV_TAG" ]; then
              commits=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --no-merges | grep -i "^- ${prefix}" | sed "s/^- ${prefix}[:(]/- /i" || true)
            else
              commits=$(git log --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --no-merges | grep -i "^- ${prefix}" | sed "s/^- ${prefix}[:(]/- /i" || true)
            fi
            if [ -n "$commits" ]; then
              echo "### ${emoji} ${title}"
              echo ""
              echo "$commits"
              echo ""
            fi
          }

          FEAT=$(build_section "feat" "🚀" "Tính năng mới")
          FIX=$(build_section "fix" "🐛" "Sửa lỗi")
          PERF=$(build_section "perf" "⚡" "Cải thiện hiệu suất")
          SECURITY=$(build_section "security" "🔐" "Bảo mật")
          CHORE=$(build_section "chore" "🧹" "Dọn dẹp nội bộ")
          CI=$(build_section "ci" "🔧" "CI/CD")
          REFACTOR=$(build_section "refactor" "♻️" "Tái cấu trúc")
          DOCS=$(build_section "docs" "📖" "Tài liệu")

          CHANGELOG="${FEAT}${FIX}${PERF}${SECURITY}${CHORE}${CI}${REFACTOR}${DOCS}"
          if [ -z "$CHANGELOG" ]; then
            if [ -n "$PREV_TAG" ]; then
              CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --no-merges || true)
            else
              CHANGELOG=$(git log --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --no-merges | head -20 || true)
            fi
            CHANGELOG="### Tất cả thay đổi

${CHANGELOG}"
          fi

          COMPARE_URL=""
          if [ -n "$PREV_TAG" ]; then
            COMPARE_URL="**Full Diff**: [${PREV_TAG}...${TAG_NAME}](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG_NAME})"
          fi

          cat > RELEASE_BODY.md << BODYEOF
          ## 📋 Changelog

          ${CHANGELOG}
          ${COMPARE_URL}

          ---

          ## 🚀 Quick Start (Zero-Setup CLI)

          \`\`\`bash
          # Chạy trực tiếp qua NPX (Khuyến nghị cho AI Agent)
          npx reprosight agent run --repo . --description "<mô tả lỗi UI>" --json

          # Cài đặt toàn cục qua NPM
          npm install -g reprosight@latest
          \`\`\`

          ---

          ## 📦 Release Assets

          | File | Mô tả |
          |------|-------|
          | \`reprosight-${TAG_NAME}.tgz\` | CLI Package (cài qua npm/npx) |
          | \`reprosight-core-${TAG_NAME}.tgz\` | Core Engine tarball |
          | \`reprosight-latest.tgz\` | Latest alias |
          | \`SHA256SUMS.txt\` | Mã kiểm tra toàn vẹn SHA256 |

          ### 🔒 SHA256 Checksums
          \`\`\`text
          ${CHECKSUMS}
          \`\`\`

          ---

          ## 🛡️ Cam kết an toàn

          - **Bằng chứng trình duyệt xác định**: Playwright geometry & accessibility detectors.
          - **Cách ly Worktree**: Mọi sửa chữa chạy trong Git worktree tạm thời, không thay đổi checkout gốc.
          - **Cần phê duyệt con người**: Bắt buộc phải được human phê duyệt trước khi commit bất kỳ patch nào.
          BODYEOF

      - name: Create Professional GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            reprosight-*.tgz
            SHA256SUMS.txt
          body_path: RELEASE_BODY.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NPM (if NPM_TOKEN present)
        if: env.NPM_TOKEN != ''
        run: |
          npm publish -w reprosight --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
