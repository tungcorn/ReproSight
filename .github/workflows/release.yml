name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Quality Gates (Typecheck, Lint, Test)
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Build ReproSight
        run: npm run build

      - name: Pack CLI & Core Tarballs
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          npm pack -w reprosight
          npm pack -w @reprosight/core
          mv reprosight-[0-9]*.tgz "reprosight-${TAG_NAME}.tgz"
          mv reprosight-core-*.tgz "reprosight-core-${TAG_NAME}.tgz"
          cp "reprosight-${TAG_NAME}.tgz" reprosight-latest.tgz
          sha256sum reprosight-*.tgz > SHA256SUMS.txt

      - name: Generate Release Body Notes
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          CHECKSUMS=$(cat SHA256SUMS.txt)
          cat << EOF > RELEASE_BODY.md
          ## 🚀 Quick Start (Zero-Setup CLI)

          You can run ReproSight directly via \`npx\` or install it globally:

          \`\`\`bash
          # Direct run via NPX (Recommended for AI Agents)
          npx reprosight agent run --repo . --description "<user bug description>" --json

          # Global installation via NPM
          npm install -g reprosight@latest
          \`\`\`

          ---

          ## 📦 Release Assets & Distribution Tarballs

          - **CLI Package**: \`reprosight-${TAG_NAME}.tgz\`
          - **Core Engine**: \`reprosight-core-${TAG_NAME}.tgz\`
          - **Latest Alias**: \`reprosight-latest.tgz\`
          - **Checksums**: \`SHA256SUMS.txt\`

          ### 🔒 Verification Checksums (SHA256)
          \`\`\`text
          ${CHECKSUMS}
          \`\`\`

          ---

          ## 🛡️ Integrity & Safety Guarantees

          - **Deterministic Browser Evidence**: Playwright geometry & accessibility detectors.
          - **Worktree Isolation**: All repairs are executed in temporary Git worktrees without mutating the main checkout.
          - **Human Review Gate**: Requires explicit human approval before any patch commit.
          EOF

      - name: Create Professional GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            reprosight-*.tgz
            SHA256SUMS.txt
          body_path: RELEASE_BODY.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NPM (if NPM_TOKEN present)
        if: env.NPM_TOKEN != ''
        run: |
          npm publish -w @reprosight/core --access public
          npm publish -w reprosight --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
