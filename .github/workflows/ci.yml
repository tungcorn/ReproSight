name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      # @reprosight/core exports types from dist/; build it before dependent typechecks
      - name: Typecheck
        run: npm run typecheck
      - name: Lint (ESLint)
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Detector benchmark
        run: npm run benchmark:detectors
        timeout-minutes: 10
      - name: Localization analysis
        run: npm run benchmark:localization
        timeout-minutes: 10
      - name: E2E mock
        run: npm run e2e:mock
        timeout-minutes: 15
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reprosight-ci-artifacts
          path: |
            artifacts/benchmark/**
            .reprosight/runs/**/report/**
            .reprosight/runs/**/artifacts/**/*.png
          if-no-files-found: ignore
